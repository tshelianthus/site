<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<script>
			(function() {
				const theme = localStorage.getItem('site_theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" href="assets/css/main.css" />
